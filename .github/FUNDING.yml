<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endo Summit Season Global Platform</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f7f7fb;color:#333}
header{background:#4b1f7a;color:#fff;padding:20px}
nav a{color:#fff;margin-right:15px;text-decoration:none;font-weight:bold}
.hero{background:linear-gradient(120deg,#7b4ab8,#e6b3ff);padding:90px 20px;text-align:center;color:#fff}
.hero h1{font-size:44px;margin-bottom:10px}
.section{padding:60px 20px;max-width:1150px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.card{background:#fff;border-radius:12px;padding:22px;box-shadow:0 6px 18px rgba(0,0,0,0.1)}
.btn{background:#4b1f7a;color:#fff;padding:12px 24px;border-radius:6px;text-decoration:none;display:inline-block;margin-top:12px;border:none;cursor:pointer}
input,select{width:100%;padding:11px;margin:7px 0;border-radius:6px;border:1px solid #ccc}
.dashboard{background:#fff;padding:25px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.1)}
.wallet{background:#f3eefe;padding:18px;border-radius:8px;margin-top:10px}
.admin{background:#fff4f4;padding:18px;border-radius:8px;margin-top:15px}
footer{background:#111;color:#fff;text-align:center;padding:25px;margin-top:50px}
.badge{background:#4b1f7a;color:#fff;padding:5px 10px;border-radius:20px;font-size:12px}
</style>
</head>
<body><header>
<h2>Endo Summit Season</h2>
<nav>
<a href="#">Home</a>
<a href="#about">About</a>
<a href="#summit">Summit</a>
<a href="#membership">Membership</a>
<a href="#sponsors">Sponsors</a>
<a href="#donate">Donate</a>
<a href="#dashboard">Dashboard</a>
<a href="#admin">Admin</a>
</nav>
</header><section class="hero">
<h1>Global Endometriosis Awareness Summit</h1>
<p>Connecting doctors, advocates, researchers and global partners to advance women's health awareness.</p>
<a class="btn" href="#membership">Join Endo Summit</a>
</section><section id="about" class="section">
<h2>About Endo Summit Season</h2>
<p>Endo Summit Season is a global initiative focused on raising awareness about endometriosis and improving women's reproductive health through education, collaboration and advocacy. The summit connects patients, doctors, researchers and partners worldwide.</p>
</section><section id="summit" class="section">
<h2>Summit Highlights</h2>
<div class="grid">
<div class="card">
<h3>Medical Experts</h3>
<p>Global specialists sharing research and treatment innovation.</p>
</div>
<div class="card">
<h3>International Community</h3>
<p>Participants and advocates joining from many countries.</p>
</div>
<div class="card">
<h3>Education & Research</h3>
<p>Workshops, seminars and medical awareness programs.</p>
</div>
</div>
</section><section id="membership" class="section">
<h2>Membership Registration</h2>
<p>Membership fee: <strong>$1000</strong></p>
<p>Benefits include summit access, membership ID card, certificates and global networking.</p><form onsubmit="generateMember(event)">
<input type="text" id="name" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="text" placeholder="Country" required>
<select>
<option>Medical Professional</option>
<option>Researcher</option>
<option>Advocate</option>
<option>Participant</option>
</select><button class="btn" type="submit">Proceed to Payment</button>

</form><div id="memberCard" class="card" style="display:none;margin-top:20px"></div>
</section><section id="sponsors" class="section">
<h2>Sponsorship Opportunities</h2>
<div class="grid">
<div class="card">
<h3>Platinum Sponsor</h3>
<p>Maximum global brand visibility.</p>
<span class="badge">Premium</span>
</div>
<div class="card">
<h3>Gold Sponsor</h3>
<p>Brand promotion and summit recognition.</p>
</div>
<div class="card">
<h3>Silver Sponsor</h3>
<p>Website promotion and event acknowledgment.</p>
</div>
</div>
</section><section id="donate" class="section">
<h2>Support Women's Health</h2>
<p>Your donation helps expand education and advocacy for endometriosis awareness worldwide.</p>
<form>
<input type="number" placeholder="Donation Amount">
<button class="btn">Donate</button>
</form>
</section><section id="dashboard" class="section">
<h2>Member Dashboard</h2>
<div class="dashboard">
<p>Welcome to the Endo Summit member area.</p><div class="wallet">
<h3>Wallet Balance</h3>
<p>$0.00</p>
<p>Payments sent by the admin will appear here.</p>
</div><div class="wallet">
<h3>Membership Status</h3>
<p>Active Member</p>
</div><div class="wallet">
<h3>Certificates</h3>
<p>Download summit participation certificates.</p>
</div></div>
</section><section id="admin" class="section">
<h2>Admin Control Panel</h2>
<div class="dashboard"><div class="admin">
<h3>Total Members</h3>
<p>0</p>
</div><div class="admin">
<h3>Total Membership Revenue</h3>
<p>$0</p>
</div><div class="admin">
<h3>Total Donations</h3>
<p>$0</p>
</div><div class="admin">
<h3>Send Payment to Member</h3>
<input type="text" placeholder="Member ID">
<input type="number" placeholder="Amount">
<button class="btn">Send Payment</button>
</div></div>
</section><footer>
<p>© 2026 Endo Summit Season</p>
<p>Authorized by X‑Moon Corporate Enterprises</p>
</footer><script>
function generateMember(e){
 e.preventDefault();
 const name=document.getElementById('name').value;
 const id='ESS-'+Math.floor(100000+Math.random()*900000);
 const card=document.getElementById('memberCard');
 card.style.display='block';
 card.innerHTML=`<h3>Digital Membership Card</h3>
 <p><strong>Name:</strong> ${name}</p>
 <p><strong>Membership ID:</strong> ${id}</p>
 <p>Endo Summit Season Member</p>
 <p>Authorized by X‑Moon Corporate Enterprises</p>`;
}
</script></body>
</html>
